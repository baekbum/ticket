<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ticket</title>
</head>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .wrap {
    min-height: 100vh;
    background: var(--color-background-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: var(--font-sans);
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-xl);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 440px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: #7c4dff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .tab-bar {
    display: flex;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 1.75rem;
    gap: 0;
  }

  .tab {
    flex: 1;
    padding: 10px 0;
    background: none;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab.active {
    color: #7c4dff;
    border-bottom-color: #7c4dff;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  /* 🌟 중복체크 버튼 배치를 위한 아이디 영역 전용 레이아웃 */
  .id-input-container {
    display: flex;
    gap: 8px;
  }

  .dup-btn {
    padding: 0 12px;
    background: var(--color-background-secondary, #eee);
    color: var(--color-text-primary, #333);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .dup-btn:hover {
    background: var(--color-border-tertiary, #ddd);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }

  .required {
    color: #7c4dff;
    margin-left: 2px;
  }

  input[type=text], input[type=password], input[type=email], input[type=tel], input[type=date] {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    font-size: 14px;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    outline: none;
    border-color: #7c4dff;
    box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.12);
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-secondary);
    font-size: 16px;
    cursor: pointer;
    pointer-events: auto;
  }

  input.has-icon {
    padding-right: 36px;
  }

  .opt-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-left: 4px;
  }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: #7c4dff;
    color: white;
    border: none;
    border-radius: var(--border-radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover {
    background: #651fff;
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .divider {
    text-align: center;
    font-size: 12px;
    color: var(--color-text-secondary);
    margin: 1rem 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 0.5px;
    background: var(--color-border-tertiary);
  }

  .divider span {
    background: var(--color-background-primary);
    padding: 0 10px;
    position: relative;
  }

  .switch-link {
    text-align: center;
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 1rem;
  }

  .switch-link button {
    background: none;
    border: none;
    color: #7c4dff;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    padding: 0;
  }

  .field-hint {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }

  .field-error {
    font-size: 12px;
    color: #E24B4A;
    margin-top: 4px;
    display: none;
  }

  /* 🌟 중복 검사 통과 시 보여줄 성공 서브 메시지 스타일 */
  .field-success {
    font-size: 12px;
    color: #2E7D32;
    margin-top: 4px;
    display: none;
  }

  input.error {
    border-color: #E24B4A;
  }

  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: #3C3489;
    color: white;
    padding: 10px 20px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
  }

  .panel {
    display: none;
  }

  .panel.active {
    display: block;
  }
</style>

<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-ticket" aria-hidden="true"></i></div>
      <span class="logo-text">Ticket</span>
    </div>

    <div class="tab-bar">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <div id="panel-login" class="panel active">
      <div class="form-group">
        <label for="l-id">아이디<span class="required">*</span></label>
        <div class="input-wrap">
          <input type="text" id="l-id" placeholder="아이디를 입력하세요" class="has-icon" onkeydown="handleLoginKeydown(event)">
          <i class="ti ti-user input-icon" aria-hidden="true"></i>
        </div>
      </div>
      <div class="form-group">
        <label for="l-pw">비밀번호<span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" id="l-pw" placeholder="비밀번호를 입력하세요" class="has-icon" onkeydown="handleLoginKeydown(event)">
          <i class="ti ti-eye input-icon" id="l-eye" onclick="togglePw('l-pw','l-eye')" aria-label="비밀번호 표시"></i>
        </div>
      </div>
      <button class="submit-btn" onclick="login()">로그인하기</button>
      <div class="switch-link">
        계정이 없으신가요? <button onclick="switchTab('signup')">회원가입</button>
      </div>
    </div>

    <div id="panel-signup" class="panel">
      <div class="form-group">
        <label for="s-id">아이디<span class="required">*</span></label>
        <div class="id-input-container">
          <input type="text" id="s-id" placeholder="영문, 숫자 조합">
          <button type="button" class="dup-btn" onclick="checkIdDup()">중복확인</button>
        </div>
        <p class="field-error" id="err-s-id"></p>
        <p class="field-success" id="suc-s-id"></p>
      </div>

      <div class="form-group">
        <label for="s-name">이름<span class="required">*</span></label>
        <input type="text" id="s-name" placeholder="두 글자 이상">
        <p class="field-error" id="err-s-name"></p>
      </div>

      <div class="form-row" style="margin-top: 1rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="s-pw">비밀번호<span class="required">*</span></label>
          <div class="input-wrap">
            <input type="password" id="s-pw" placeholder="8자 이상 입력" class="has-icon">
            <i class="ti ti-eye input-icon" id="s-eye" onclick="togglePw('s-pw','s-eye')" aria-label="비밀번호 표시"></i>
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label for="s-pw-confirm">비밀번호 확인<span class="required">*</span></label>
          <div class="input-wrap">
            <input type="password" id="s-pw-confirm" placeholder="비밀번호 재입력" class="has-icon">
            <i class="ti ti-eye input-icon" id="s-eye-confirm" onclick="togglePw('s-pw-confirm','s-eye-confirm')" aria-label="비밀번호 확인 표시"></i>
          </div>
        </div>
      </div>
      <p class="field-hint">최소 8자 이상</p>
      <p class="field-error" id="err-s-pw"></p>

      <div class="form-group">
        <label for="s-email">이메일<span class="required">*</span></label>
        <input type="email" id="s-email" placeholder="example@email.com">
        <p class="field-error" id="err-s-email"></p>
      </div>

      <div class="form-group">
        <label for="s-phone">휴대폰 번호<span class="required">*</span></label>
        <input type="tel" id="s-phone" placeholder="010-0000-0000">
        <p class="field-error" id="err-s-phone"></p>
      </div>

      <div class="form-row" style="margin-bottom: 0;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="s-birth">생년월일<span class="opt-label">(선택)</span></label>
          <input type="date" id="s-birth">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label for="s-addr">주소<span class="opt-label">(선택)</span></label>
          <input type="text" id="s-addr" placeholder="주소 입력">
        </div>
      </div>
      <button class="submit-btn" style="margin-top: 1.25rem;" onclick="signup()">회원가입하기</button>
      <div class="switch-link">
        이미 계정이 있으신가요? <button onclick="switchTab('login')">로그인</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>

<script>
  const API = {
    VERSION: 'v1',
    AUTH_SERVICE_PORT: '8080',
    USER_SERVICE_PORT: '8081',
    DEV_PORT: '3000'
  };

  let isIdChecked = false;
  let checkedUserId = "";

  function base(serviceName) {
    let port;

    if (serviceName === 'auth') {
      port = API.AUTH_SERVICE_PORT;
    } else if (serviceName === 'user') {
      port = API.USER_SERVICE_PORT;
    }

    return window.location.port === API.DEV_PORT ? `http://localhost:${port}` : '';
  }

  function switchTab(t) {
    // 1. 기존 활성화된 탭 및 패널 active 클래스 제거
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));

    // 2. 선택된 탭과 패널 active 클래스 추가 (화면 전환)
    document.getElementById('tab-' + t).classList.add('active');
    document.getElementById('panel-' + t).classList.add('active');

    // 3. 🌟 [추가] 회원가입 폼 초기화 로직
    // 로그인 탭으로 가든, 회원가입 탭으로 새로 오든 폼을 깨끗하게 청소합니다.
    const signupPanel = document.getElementById('panel-signup'); // 회원가입 패널 ID에 맞게 수정 (예: 'panel-signup' 또는 'panel-s')
    if (signupPanel) {
      // 패널 내부의 form 태그를 찾아 리셋
      const form = signupPanel.querySelector('form');
      if (form) {
        form.reset();
      } else {
        // 만약 form 태그가 없다면 패널 내부의 모든 일반 input창 비우기
        signupPanel.querySelectorAll('input').forEach(input => {
          if (input.type !== 'hidden') input.value = '';
        });
      }
    }

    // 4. 🌟 [추가] 비밀번호 일치 에러 메시지 텍스트 지우기
    const errorMsg = document.getElementById('err-s-pw');
    if (errorMsg) {
      errorMsg.textContent = '';
    }
  }

  function togglePw(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const ic = document.getElementById(iconId);

    if (inp.type === 'password') {
      inp.type = 'text';
      ic.className = 'ti ti-eye-off input-icon';
    } else {
      inp.type = 'password';
      ic.className = 'ti ti-eye input-icon';
    }
  }

  function showToast(msg, err) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = err ? '#A32D2D' : '#3C3489';
    t.classList.add('show');

    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function setErr(id, msg) {
    const el = document.getElementById('err-' + id);
    const inp = document.getElementById(id);
    if (!el || !inp) return;

    if (msg) {
      el.textContent = msg;
      el.style.display = 'block';
      inp.classList.add('error');

      // 에러 출력 시 성공 메시지는 가려주기
      const sucEl = document.getElementById('suc-' + id);
      if (sucEl) sucEl.style.display = 'none';
    } else {
      el.style.display = 'none';
      inp.classList.remove('error');
    }
  }

  function handleLoginKeydown(e) {
    if (e.key === 'Enter') {
      e.preventDefault(); // 엔터 입력 시 브라우저 기본 포커스 이동이나 폼 제출 방지
      login(); // 기존 로그인 비동기 함수 실행
    }
  }

  // 🌟 성공 메시지 노출용 유틸 함수 추가
  function setSuccess(id, msg) {
    const el = document.getElementById('suc-' + id);
    const inp = document.getElementById(id);
    if (!el || !inp) return;

    if (msg) {
      el.textContent = msg;
      el.style.display = 'block';
      inp.classList.remove('error');

      // 성공 메시지 출력 시 에러 문구는 가려주기
      const errEl = document.getElementById('err-' + id);
      if (errEl) errEl.style.display = 'none';
    } else {
      el.style.display = 'none';
    }
  }

  function clearErrs() {
    ['s-id', 's-name', 's-pw', 's-email', 's-phone'].forEach(k => setErr(k, ''));
    document.getElementById('suc-s-id').style.display = 'none';
  }

  // 🌟 아이디 입력값이 변경되면 중복체크 상태 초기화 (실무 디테일)
  document.getElementById('s-id').addEventListener('input', () => {
    isIdChecked = false;
    checkedUserId = "";
    document.getElementById('suc-s-id').style.display = 'none';
  });

  // 🌟 추가: 아이디 중복 검사 비동기 함수
  async function checkIdDup() {
  const id = document.getElementById('s-id').value.trim();

  if (!id) {
    setErr('s-id', '아이디를 입력해주세요.');
    return;
  }

  try {
      const res = await fetch(`${base('user')}/user/api/${API.VERSION}/check/duplication/${id}`, {
        method: 'GET'
      });

      // 예외가 안 터지고 200 OK(ResponseEntity.ok())가 내려온 경우 -> 중복 없음!
      if (res.ok) {
        setSuccess('s-id', '사용 가능한 아이디입니다.');
        isIdChecked = true;
        checkedUserId = id;
      }

      // 백엔드에서 중복 예외(Custom Exception)가 터져서 4xx/5xx 에러 코드가 내려온 경우
      else {
        // 스프링 부트 에러 핸들러(RestControllerAdvice 등)가 보내준 에러 메시지가 있다면 파싱
        const e = await res.json().catch(() => ({}));

        // 커스텀 예외 메시지가 있으면 그걸 띄우고, 없으면 기본 안내 문구 출력
        setErr('s-id', e.message || '이미 사용 중인 아이디입니다.');
        isIdChecked = false;
        checkedUserId = "";
      }
    } catch (e) {
      console.error('Error:', e);
      showToast('서버와 통신 중 오류가 발생했습니다.', true);
    }
  }

  async function login() {
    const userId = document.getElementById('l-id').value.trim();
    const password = document.getElementById('l-pw').value;

    if (!userId || !password) {
      showToast('아이디와 비밀번호를 모두 입력해주세요.', true);
      return;
    }

    try {
      const res = await fetch(`${base('auth')}/auth/api/${API.VERSION}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, password })
      });

      if (res.ok) {
        const d = await res.json();

        // 1. 토큰 저장
        localStorage.setItem('accessToken', d.accessToken);
        localStorage.setItem('refreshToken', d.refreshToken);

        // 브라우저 쿠키에 accessToken 탑재
        // path=/ 로 설정해야 모든 경로에서 쿠키를 서버로 실어 보냅니다.
        document.cookie = `accessToken=${d.accessToken}; path=/; max-age=3600; SameSite=Strict;`;

        showToast(`${userId}님, 환영합니다!`);

        // 2. 🌟 주소창에 관리자 경로를 노출하지 않고, 공통 경로로 리다이렉트!
        setTimeout(() => {
          window.location.href = '/home';
        }, 1000);

      } else {
        const e = await res.json().catch(() => ({}));
        showToast(e.message || '아이디 또는 비밀번호가 일치하지 않습니다.', true);
      }
    } catch (e) {
      showToast('서버와 통신 중 오류가 발생했습니다.', true);
    }
  }

  async function signup() {
    clearErrs();

    const id = document.getElementById('s-id').value.trim();
    const name = document.getElementById('s-name').value.trim();
    const pw = document.getElementById('s-pw').value;
    const pwConfirm = document.getElementById('s-pw-confirm').value;
    const email = document.getElementById('s-email').value.trim();
    const phone = document.getElementById('s-phone').value.trim();
    const birth = document.getElementById('s-birth').value;
    const addr = document.getElementById('s-addr').value.trim();

    let ok = true;

    // 1. 아이디 및 중복 확인 유효성 검증
    if (!id) {
      setErr('s-id', '아이디를 입력해주세요.');
      ok = false;
    } else if (!isIdChecked || checkedUserId !== id) {
      // 중복검사 버튼을 누르지 않았거나, 검사 후 아이디를 바꿨을 때 차단
      setErr('s-id', '아이디 중복 확인을 진행해주세요.');
      ok = false;
    }

    if (!name || name.length < 2) {
      setErr('s-name', '이름은 두 글자 이상 입력해주세요.');
      ok = false;
    }

    // 2. 비밀번호 및 일치 여부 유효성 검증
    if (!pw || pw.length < 8) {
      setErr('s-pw', '비밀번호는 8자 이상이어야 합니다.');
      ok = false;
    } else if (pw !== pwConfirm) {
      setErr('s-pw', '입력하신 두 비밀번호가 일치하지 않습니다.');
      ok = false;
    }

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setErr('s-email', '올바른 이메일을 입력해주세요.');
      ok = false;
    }
    if (!phone) {
      setErr('s-phone', '휴대폰 번호를 입력해주세요.');
      ok = false;
    }
    if (!ok) return;

    const body = {
      userId: id,
      password: pw,
      name,
      email,
      phoneNumber: phone
    };

    if (birth) body.birthDate = birth;
    if (addr) body.address = addr;

    try {
      const res = await fetch(`${base('user')}/user/api/${API.VERSION}/insert`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        showToast('회원가입이 완료되었습니다. 로그인해주세요.');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        const e = await res.json().catch(() => ({}));
        showToast(e.message || '회원가입 중 오류가 발생했습니다.', true);
      }
    } catch (e) {
      showToast('서버와 통신 중 오류가 발생했습니다.', true);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const pwInput = document.getElementById('s-pw');
    const pwConfirmInput = document.getElementById('s-pw-confirm');
    const errorMsg = document.getElementById('err-s-pw');

    // "비밀번호 확인" 인풋에서 포커스가 벗어날 때(blur) 검증 실행
    pwConfirmInput.addEventListener('blur', () => {
      const pwValue = pwInput.value;
      const confirmValue = pwConfirmInput.value;

      // 1. 비밀번호 확인 칸이 비어있다면 에러 메시지 초기화 후 종료
      if (!confirmValue) {
        errorMsg.textContent = '';
        errorMsg.style.display = 'none'; // 필요 시 스타일 제어
        return;
      }

      // 2. 두 비밀번호가 일치하는지 비교
      if (pwValue !== confirmValue) {
        // 일치하지 않을 때
        errorMsg.textContent = '비밀번호가 일치하지 않습니다.';
        errorMsg.style.color = '#ff4d4f'; // 에러 색상 (적절히 변경 가능)
        errorMsg.style.display = 'block';
      } else {
        // 일치할 때 (에러 메시지 삭제)
        errorMsg.textContent = '';
        errorMsg.style.display = 'none';
      }
    });

    // [옵션] 비밀번호 원본 칸을 수정할 때도 실시간으로 맞춰보고 싶다면 추가
    pwInput.addEventListener('input', () => {
      // 비밀번호 확인 칸에 이미 값이 차 있는 상태에서 원본을 바꿀 때만 체크
      if (pwConfirmInput.value) {
        if (pwInput.value === pwConfirmInput.value) {
          errorMsg.textContent = '';
          errorMsg.style.display = 'none';
        }
      }
    });
  });
</script>
</html>
