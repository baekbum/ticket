<head>
    <meta charset="UTF-8">
</head>
<style>
    .main-content h2 { font-size: 20px; color: #212529; margin-bottom: 4px; }
    .sub-txt { font-size: 13px; color: #868e96; margin-bottom: 1.5rem; }

    /* 검색창 상단 레이아웃 */
    .search-row-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .search-box { display: flex; gap: 8px; align-items: center; }
    .search-box input[type=text] {
      padding: 10px 12px;
      border: 0.5px solid #dee2e6;
      border-radius: 6px;
      font-size: 14px;
      width: 200px;
    }
    .search-box input[type=text]:focus {
      outline: none;
      border-color: #7c4dff;
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.12);
    }

    /* 버튼 스타일 디자인 */
    .btn {
      padding: 10px 16px;
      background: #7c4dff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn:hover { background: #6536ff; }
    .btn-danger { background: #e24b4a; }
    .btn-danger:hover { background: #cc3b3a; }
    .btn-secondary { background: #868e96; }
    .btn-secondary:hover { background: #727b84; }
    .btn-outline { background: #ffffff; color: #495057; border: 1px solid #ced4da; }
    .btn-outline:hover { background: #f8f9fa; }
    .btn-success { background: #2b8a3e; }
    .btn-success:hover { background: #237032; }

    /* 경고/주의 전용 주황색 테마 버튼 (비밀번호 초기화용) */
    .btn-warning { background: #f59f00; color: white; }
    .btn-warning:hover { background: #e67700; }

    .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 4px; margin-right: 4px; }

    /* 테이블 스크롤 컨테이너 */
    .table-container {
      width: 100%;
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 8px;
    }

    /* 테이블 스타일 */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #e9ecef; text-align: left; vertical-align: middle; }
    .admin-table th { background: #f8f9fa; font-weight: 600; color: #495057; position: sticky; top: 0; z-index: 10; }
    .admin-table th.actions, .admin-table td.actions { text-align: center; width: 140px; }

    .sortable { cursor: pointer; user-select: none; transition: background 0.15s; }
    .sortable:hover { background: #e9ecef !important; }
    .sort-icon { display: inline-block; margin-left: 4px; color: #adb5bd; font-size: 12px; font-style: normal; }
    .sortable.asc .sort-icon { color: #7c4dff; }
    .sortable.desc .sort-icon { color: #7c4dff; }

    /* 레이아웃 그리드 구성 */
    .table-pagination {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin-top: 1.25rem;
      padding: 0 4px;
    }

    .page-size-selector { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #495057; }
    .page-size-selector select { padding: 6px 10px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 13px; outline: none; }

    .pagination-controls {
      grid-column: 2;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-page-nav {
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid #dee2e6;
      color: #495057;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-page-nav:hover { background: #f1f3f5; border-color: #ced4da; }

    .page-number-viewer { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #495057; padding: 0 8px; }
    .page-number-viewer input[type=number] {
      width: 46px;
      padding: 5px 6px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }
    .page-number-viewer input[type=number]:focus { border-color: #7c4dff; }

    #user-table-body tr:hover {
        background-color: #f8f9fa;
    }

    /* 뱃지 스타일 */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
    .badge-user { background: #e7f5ff; color: #0b72b9; }
    .badge-admin { background: #fff0f6; color: #d6336c; }
    .badge-danger { background: #fff5f5; color: #fa5252; }

    /* 모달 폼 전용 스타일 */
    .f-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); justify-content:center; align-items:center; z-index:1000; }
    .f-modal-content { background:white; padding:2rem; border-radius:12px; width:100%; max-width:480px; text-align: left;}
    .form-group { margin-bottom: 1rem; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:#495057; margin-bottom:6px; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 0.5px solid #dee2e6; border-radius: 6px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #7c4dff; box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.12); }
    .form-group input:disabled, .form-group select:disabled { background: #f1f3f5; color: #868e96; cursor: not-allowed; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .confirm-modal-content { max-width: 360px; text-align: center; padding: 1.75rem; }
</style>

<h2>유저(회원) CRUD 관리</h2>
<p class="sub-txt">전체 유저 검색 및 상세 정보 관리, 블랙리스트 지정이 가능합니다.</p>

<div class="search-row-container">
    <div class="search-box">
        <input type="text" id="search-id" placeholder="아이디 검색">
        <button class="btn" onclick="triggerNormalSearch()">검색하기</button>
        <button class="btn btn-outline" onclick="openSearchModal()"><i class="ti ti-adjustments-horizontal"></i> 상세 검색</button>
    </div>
    <button class="btn btn-success" onclick="openModalForCreate()"><i class="ti ti-user-plus"></i> + 신규 유저 등록</button>
</div>

<div class="table-container">
    <table class="admin-table">
        <thead>
        <tr>
            <th>순서</th>
            <th class="sortable" data-sort-field="userId" onclick="handleSortClick(this, event)">유저 ID <i class="sort-icon">↕</i></th>
            <th class="sortable" data-sort-field="name" onclick="handleSortClick(this, event)">이름 <i class="sort-icon">↕</i></th>
            <th class="sortable" data-sort-field="email" onclick="handleSortClick(this, event)">이메일 <i class="sort-icon">↕</i></th>
            <th>권한</th>
            <th>상태</th>
            <th class="actions">관리</th>
        </tr>
        </thead>
        <tbody id="user-table-body">
        </tbody>
    </table>
</div>

<div class="table-pagination">
    <div class="page-size-selector">
        <span>페이지당 보기:</span>
        <select id="pagination-size" onchange="handleSizeChange()">
            <option value="5" selected>5개씩</option>
            <option value="10">10개씩</option>
            <option value="20">20개씩</option>
            <option value="50">50개씩</option>
            <option value="100">100개씩</option>
        </select>
    </div>

    <div class="pagination-controls">
        <button class="btn-page-nav" onclick="navigatePage(-5)" title="5페이지 앞으로">«</button>
        <button class="btn-page-nav" onclick="navigatePage(-1)" title="1페이지 앞으로">‹</button>

        <div class="page-number-viewer">
            <input type="number" id="pagination-current" value="1" min="1" onkeydown="handlePageKeydown(event)" onchange="handlePageInputChange()">
            <span style="color: #adb5bd;">/</span>
            <span id="pagination-total" style="font-weight: 500;">1</span>
        </div>

        <button class="btn-page-nav" onclick="navigatePage(1)" title="1페이지 뒤로">›</button>
        <button class="btn-page-nav" onclick="navigatePage(5)" title="5페이지 뒤로">»</button>
    </div>
    <div></div>
</div>

        <div class="form-row">

                <label>휴대폰 번호</label>
                <input type="text" id="cond-phone" placeholder="010-XXXX-XXXX">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="cond-email" placeholder="example@test.com">

            <div class="form-group">

        </div>
        <div class="form-row">

            </div>
            <div class="form-group">

        <div class="form-row">

        </div>

</div>

<div class="f-modal" id="confirm-modal">

        <div style="font-size: 40px; color: #e24b4a; margin-bottom: 8px;"><i class="ti ti-alert-triangle"></i></div>
        <h3 style="margin-bottom: 8px; color:#212529;">정말 삭제하시겠습니까?</h3>
        <p style="font-size: 13px; color:#868e96; margin-bottom: 1.5rem;">삭제된 유저 정보는 다시 복구할 수 없습니다.</p>
        <input type="hidden" id="confirm-target-id">
        <div class="form-row">
            <button class="btn btn-secondary" onclick="closeConfirmModal()">취소</button>
            <button class="btn btn-danger" onclick="submitDeleteConfirm()">진짜 삭제</button>
        </div>
    </div>
</div>

<div class="f-modal" id="pw-init-confirm-modal" style="z-index: 1100;">
    <div class="f-modal-content confirm-modal-content">
        <div style="font-size: 40px; color: #f59f00; margin-bottom: 8px;"><i class="ti ti-lock-open"></i></div>
        <h3 style="margin-bottom: 8px; color:#212529;">비밀번호를 초기화하시겠습니까?</h3>
        <p style="font-size: 13px; color:#868e96; margin-bottom: 1.5rem;">확인 시 해당 계정의 비밀번호가 <br><strong style="color:#e67700;">"123456789!"</strong> 로 즉시 강제 리셋됩니다.</p>
        <div class="form-row">
            <button class="btn btn-secondary" onclick="closePasswordInitConfirmModal()">취소</button>
            <button class="btn btn-warning" onclick="submitPasswordInit()">초기화 진행</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const API = { VERSION: 'v1', USER_SERVICE_PORT: '8081', DEV_PORT: '3000' };
        const BASE_URL = window.location.port === '3000' ? `http://localhost:${API.USER_SERVICE_PORT}` : '';
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` };

        let currentSearchFilters = { userId: null, name: null, phoneNumber: null, email: null, birthDate: null, address: null, isBlacklisted: null };
        let serverTotalPages = 1;
        let currentSortFilters = {};

        window.loadUserList = async function(pageZeroIndexed = 0) {
            const pageSize = parseInt(document.getElementById('pagination-size').value, 10);

            let sortArray = [];
            Object.keys(currentSortFilters).forEach(field => {
                const direction = currentSortFilters[field];
                if (direction) sortArray.push(`${field}-${direction}`);
            });

            let cond = {
                ...currentSearchFilters,
                page: pageZeroIndexed,
                size: pageSize,
                sort: sortArray.length > 0 ? sortArray : null
            };

            try {
                const res = await fetch(`${BASE_URL}/user/api/${API.VERSION}/select`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(cond)
                });

                if(res.ok) {
                    const pagedModel = await res.json();
                    const list = pagedModel.content || [];

                    if (pagedModel.page) {
                        serverTotalPages = pagedModel.page.totalPages > 0 ? pagedModel.page.totalPages : 1;
                    } else {
                        serverTotalPages = pagedModel.totalPages > 0 ? pagedModel.totalPages : 1;
                    }

                    document.getElementById('pagination-total').textContent = serverTotalPages;
                    document.getElementById('pagination-current').value = pageZeroIndexed + 1;

                    const tbody = document.getElementById('user-table-body');
                    tbody.innerHTML = '';

                    list.forEach((u, index) => {
                        const roleHtml = u.role === 'ROLE_ADMIN' ? `<span class="badge badge-admin">ADMIN</span>` : `<span class="badge badge-user">USER</span>`;
                        const statusHtml = u.isBlacklisted ? `<span class="badge badge-danger">블랙</span>` : `<span>정상</span>`;
                        const tr = document.createElement('tr');
                        tr.setAttribute('data-pk', u.id);

                        // 🌟 스타일 추가: 테이블 행에 마우스를 올리면 포인터 손모양과 배경색이 바뀌도록 유도
                        tr.style.cursor = 'pointer';

                        // 🌟 Row 자체를 클릭하면 상세 조회(VIEW) 모달 호출
                        tr.onclick = function() {
                            window.openModalForView(u.userId);
                        };

                        const rowOrder = (pageZeroIndexed * pageSize) + (index + 1);

                        // 🌟 중요: 버튼 클릭 시 tr.onclick이 함께 터지는 '버블링' 현상을 event.stopPropagation()으로 완벽 방어
                        tr.innerHTML = `
                            <td>${rowOrder}</td>
                            <td><strong>${u.userId}</strong></td>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                            <td>${roleHtml}</td>
                            <td>${statusHtml}</td>
                            <td class="actions">
                                <button class="btn btn-sm" onclick="event.stopPropagation(); window.openModalForUpdate('${u.userId}')">수정</button>
                                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); window.openConfirmModalFromRow('${u.userId}')">삭제</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    syncSortHeaderUI();
                } else { showToast('유저 목록 조회 실패', true); }
            } catch (e) { showToast('서버 통신 오류', true); }
        };

        window.handleSortClick = function(headerEl, event) {
            const field = headerEl.getAttribute('data-sort-field');
            const currentDir = currentSortFilters[field];
            let nextDir = null;

            if (!currentDir) nextDir = 'asc';
            else if (currentDir === 'asc') nextDir = 'desc';
            else nextDir = null;

            if (!event.shiftKey) currentSortFilters = {};

            if (nextDir) currentSortFilters[field] = nextDir;
            else delete currentSortFilters[field];

            loadUserList(0);
        };

        function syncSortHeaderUI() {
            document.querySelectorAll('.sortable').forEach(th => {
                const field = th.getAttribute('data-sort-field');
                const dir = currentSortFilters[field];
                const icon = th.querySelector('.sort-icon');
                th.classList.remove('asc', 'desc');

                if (dir === 'asc') { th.classList.add('asc'); icon.textContent = '▲'; }
                else if (dir === 'desc') { th.classList.add('desc'); icon.textContent = '▼'; }
                else { icon.textContent = '↕'; }
            });
        }

        // 🌟 [수정] 테이블 Row 클릭 시 호출되는 순수 상세 조회 모달
        window.openModalForView = async function(userId) {
            document.getElementById('m-modal-mode').value = 'VIEW';
            document.getElementById('modal-title').textContent = '유저 상세 정보 조회 (VIEW)';

            // 모든 input 및 select 태그 비활성화 처리
            const inputs = document.querySelectorAll('#user-modal input, #user-modal select');
            inputs.forEach(el => {
                el.disabled = true;
                el.style.background = '#f1f3f5';
                el.style.color = '#868e96';
                el.style.cursor = 'not-allowed';
            });

            try {
                const res = await fetch(`${BASE_URL}/user/api/${API.VERSION}/select/id/${userId}`, { headers: headers });
                if(res.ok) {
                    const u = await res.json();
                    document.getElementById('m-target-id').value = u.userId;
                    document.getElementById('m-user-id').value = u.userId;
                    document.getElementById('m-name').value = u.name || '';
                    document.getElementById('m-email').value = u.email || '';
                    document.getElementById('m-phone').value = u.phoneNumber || '';
                    document.getElementById('m-birth').value = u.birthDate || '';
                    document.getElementById('m-addr').value = u.address || '';
                    document.getElementById('m-blacklist').value = String(u.isBlacklisted);
                    document.getElementById('m-role').value = u.role || 'ROLE_USER';

                    // 하단 제어 버튼 및 비밀번호 관리 패널 전체 숨김
                    document.getElementById('wrapper-password-init').style.display = 'none';
                    document.getElementById('btn-modal-submit').style.display = 'none';
                    document.getElementById('btn-modal-delete').style.display = 'none';

                    // 🌟 [핵심 변경] 취소/닫기 버튼이 포함된 form-row 컨테이너를 한 줄 전체(block) 쓰도록 변경
                    const bottomFormRow = document.querySelector('#user-modal .form-row:last-of-type');
                    if (bottomFormRow) {
                        bottomFormRow.style.display = 'block';
                    }

                    // 기존 '취소' 버튼을 '닫기' 텍스트로 바꾸고 가로 100% 꽉 차게 설정
                    const cancelBtn = document.querySelector('#user-modal .btn-secondary');
                    if(cancelBtn) {
                        cancelBtn.textContent = '닫기';
                        cancelBtn.style.width = '100%';
                    }

                    document.getElementById('user-modal').style.display = 'flex';
                }
            } catch(e) { showToast('유저 정보 로드 실패', true); }
        };

        // 🌟 [수정] 등록 팝업 시 레이아웃 복원 프로토콜
        window.openModalForCreate = function() {
            document.getElementById('m-modal-mode').value = 'CREATE';
            document.getElementById('modal-title').textContent = '신규 회원 등록 (ADMIN)';

            // VIEW 모드에서 disabled 되었던 필드들을 전원 활성화 리셋
            const inputs = document.querySelectorAll('#user-modal input, #user-modal select');
            inputs.forEach(el => {
                el.disabled = false;
                el.style.background = '#ffffff';
                el.style.color = '#212529';
                el.style.cursor = 'text';
            });

            // 입력 폼 필드 초기화
            document.getElementById('m-user-id').value = '';
            document.getElementById('m-target-id').value = '';
            document.getElementById('m-name').value = '';
            document.getElementById('m-email').value = '';
            document.getElementById('m-phone').value = '';
            document.getElementById('m-birth').value = '';
            document.getElementById('m-addr').value = '';
            document.getElementById('m-blacklist').value = 'false';
            document.getElementById('m-role').value = 'ROLE_USER';

                    // 🌟 [레이아웃 복원] VIEW 모드에서 붕괴했던 하단 버튼 그리드 구조 원상 복구
                    const bottomFormRow = document.querySelector('#user-modal .form-row:last-of-type');
                    if (bottomFormRow) {
                        bottomFormRow.style.display = 'grid';
                    }

            // 버튼 UI 복원
            document.getElementById('btn-modal-submit').style.display = 'block';
            document.getElementById('btn-modal-submit').textContent = '신규 등록하기';
            document.getElementById('btn-modal-delete').style.display = 'none';
            document.getElementById('wrapper-password-init').style.display = 'none';

            const cancelBtn = document.querySelector('#user-modal .btn-secondary');
            if(cancelBtn) {
                cancelBtn.textContent = '취소';
                cancelBtn.style.width = 'auto'; // 원래 크기로 원복
            }

            document.getElementById('user-modal').style.display = 'flex';
        };

        // 🌟 [수정] 수정 팝업 시 레이아웃 복원 프로토콜
        window.openModalForUpdate = async function(userId) {
            document.getElementById('m-modal-mode').value = 'UPDATE';
            document.getElementById('modal-title').textContent = '유저 상세 정보 수정 (ADMIN)';

            // 전체 필드 우선 활성화 후 특정 필드만 잠금
            const inputs = document.querySelectorAll('#user-modal input, #user-modal select');
            inputs.forEach(el => {
                el.disabled = false;
                el.style.background = '#ffffff';
                el.style.color = '#212529';
                el.style.cursor = 'text';
            });

            // 아이디와 이름은 수정 불가 스타일 적용
            const disabledFields = [document.getElementById('m-user-id'), document.getElementById('m-name')];
            disabledFields.forEach(idInput => {
                idInput.disabled = true;
                idInput.style.background = '#f1f3f5';
                idInput.style.color = '#868e96';
                idInput.style.cursor = 'not-allowed';
            });

            try {
                const res = await fetch(`${BASE_URL}/user/api/${API.VERSION}/select/id/${userId}`, { headers: headers });
                if(res.ok) {
                    const u = await res.json();
                    document.getElementById('m-target-id').value = u.userId;
                    document.getElementById('m-user-id').value = u.userId;
                    document.getElementById('m-name').value = u.name || '';
                    document.getElementById('m-email').value = u.email || '';
                    document.getElementById('m-phone').value = u.phoneNumber || '';
                    document.getElementById('m-birth').value = u.birthDate || '';
                    document.getElementById('m-addr').value = u.address || '';
                    document.getElementById('m-blacklist').value = String(u.isBlacklisted);
                    document.getElementById('m-role').value = u.role || 'ROLE_USER';

                    // 🌟 [레이아웃 복원] VIEW 모드에서 붕괴했던 하단 버튼 그리드 구조 원상 복구
                    const bottomFormRow = document.querySelector('#user-modal .form-row:last-of-type');
                    if (bottomFormRow) {
                        bottomFormRow.style.display = 'grid';
                    }

                    // 버튼 UI 복원
                    document.getElementById('btn-modal-submit').style.display = 'block';
                    document.getElementById('btn-modal-submit').textContent = '변경사항 저장';
                    document.getElementById('btn-modal-delete').style.display = 'block';
                    document.getElementById('wrapper-password-init').style.display = 'block';

                    const cancelBtn = document.querySelector('#user-modal .btn-secondary');
                    if(cancelBtn) {
                        cancelBtn.textContent = '취소';
                        cancelBtn.style.width = 'auto'; // 원래 크기로 원복
                    }

                    document.getElementById('user-modal').style.display = 'flex';
                }
            } catch(e) { showToast('유저 정보 로드 실패', true); }
        };

        window.closeModal = function() { document.getElementById('user-modal').style.display = 'none'; };

        window.submitUserForm = async function() {
            const mode = document.getElementById('m-modal-mode').value;
            const userIdVal = document.getElementById('m-user-id').value.trim();

            const body = {
                name: document.getElementById('m-name').value.trim(),
                phoneNumber: document.getElementById('m-phone').value.trim(),
                email: document.getElementById('m-email').value.trim(),
                birthDate: document.getElementById('m-birth').value || null,
                address: document.getElementById('m-addr').value.trim(),
                isBlacklisted: document.getElementById('m-blacklist').value === 'true',
                role: document.getElementById('m-role').value
            };

            // 등록(CREATE)일 경우에만 바디의 루트 명세 및 필수 조건 패스워드 주입 가공 처리
            if (mode === 'CREATE') {
                if(!userIdVal || !body.name) {
                    showToast('아이디와 이름은 필수 입력 항목입니다.', true);
                    return;
                }
                body.userId = userIdVal;
                body.password = userIdVal + "123!";
            } else {
                if(!body.name) {
                    showToast('이름은 필수 입력 항목입니다.', true);
                    return;
                }
            }

            let url = '';
            let method = '';

            if (mode === 'CREATE') {
                url = `${BASE_URL}/user/api/${API.VERSION}/insert`;
                method = 'POST';
            } else {
                const targetId = document.getElementById('m-target-id').value;
                url = `${BASE_URL}/user/api/${API.VERSION}/update/id/${targetId}`;
                method = 'PUT';
            }

            try {
                const res = await fetch(url, { method: method, headers: headers, body: JSON.stringify(body) });
                if(res.ok) {
                    showToast(mode === 'CREATE' ? '성공적으로 등록되었습니다.' : '성공적으로 수정되었습니다.');
                    closeModal();
                    const curr = mode === 'CREATE' ? 0 : parseInt(document.getElementById('pagination-current').value, 10) - 1;
                    loadUserList(curr);
                } else { showToast('처리에 실패했습니다.', true); }
            } catch(e) { showToast('통신 장애', true); }
        };

        // 🌟 신규 기능 구현: 비밀번호 초기화 컨펌 창 열기/닫기 제어 프로토콜
        window.openPasswordInitConfirmModal = function() {
            document.getElementById('pw-init-confirm-modal').style.display = 'flex';
        };

        window.closePasswordInitConfirmModal = function() {
            document.getElementById('pw-init-confirm-modal').style.display = 'none';
        };

        // 🌟 신규 기능 구현: 원격 비밀번호 초기화 통신 엔진 런칭 (PUT 메서드 타겟팅)
        window.submitPasswordInit = async function() {
            const targetId = document.getElementById('m-target-id').value;

            try {
                const res = await fetch(`${BASE_URL}/user/api/${API.VERSION}/init/password/${targetId}`, {
                    method: 'PUT',
                    headers: headers
                });

                if (res.ok) {
                    showToast('비밀번호가 "123456789!" 로 성공적으로 초기화되었습니다.');
                    closePasswordInitConfirmModal();
                } else {
                    showToast('비밀번호 초기화 요청 처리에 실패했습니다.', true);
                }
            } catch (e) {
                showToast('비밀번호 재발급 통신 장애 발생', true);
            }
        };

        window.triggerNormalSearch = function() {
            currentSearchFilters = { userId: document.getElementById('search-id').value.trim() || null, name: null, phoneNumber: null, email: null, birthDate: null, address: null, isBlacklisted: null };
            loadUserList(0);
        };

        window.openSearchModal = function() { document.getElementById('search-modal').style.display = 'flex'; };
        window.closeSearchModal = function() { document.getElementById('search-modal').style.display = 'none'; };

        window.submitDetailedSearch = function() {
            const isBlackVal = document.getElementById('cond-blacklist').value;
            currentSearchFilters = {
                userId: document.getElementById('cond-id').value.trim() || null,
                name: document.getElementById('cond-name').value.trim() || null,
                phoneNumber: document.getElementById('cond-phone').value.trim() || null,
                email: document.getElementById('cond-email').value.trim() || null,
                birthDate: document.getElementById('cond-birth').value || null,
                address: document.getElementById('cond-addr').value.trim() || null,
                isBlacklisted: isBlackVal === "" ? null : (isBlackVal === "true")
            };
            loadUserList(0);
            closeSearchModal();
        };

        window.handleSizeChange = function() { loadUserList(0); };

        window.navigatePage = function(offset) {
            const inputEl = document.getElementById('pagination-current');
            let currentPage = parseInt(inputEl.value, 10);
            if (isNaN(currentPage)) currentPage = 1;
            let targetPage = currentPage + offset;

            if (targetPage < 1) targetPage = 1;
            else if (targetPage > serverTotalPages) targetPage = serverTotalPages;

            if (currentPage !== targetPage) {
                inputEl.value = targetPage;
                loadUserList(targetPage - 1);
            }
        };

        window.handlePageKeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); processPageInputMovement(); } };
        window.handlePageInputChange = function() { processPageInputMovement(); };

        function processPageInputMovement() {
            const inputEl = document.getElementById('pagination-current');
            let targetPage = parseInt(inputEl.value, 10);
            if (isNaN(targetPage) || targetPage < 1) targetPage = 1;
            else if (targetPage > serverTotalPages) targetPage = serverTotalPages;
            inputEl.value = targetPage;
            loadUserList(targetPage - 1);
        }

        window.openConfirmModalFromRow = function(userId) {
            document.getElementById('confirm-target-id').value = userId;
            document.getElementById('confirm-modal').style.display = 'flex';
        };

        window.openConfirmModalFromModal = function() {
            const targetId = document.getElementById('m-target-id').value;
            document.getElementById('confirm-target-id').value = targetId;
            document.getElementById('confirm-modal').style.display = 'flex';
        };

        window.closeConfirmModal = function() { document.getElementById('confirm-modal').style.display = 'none'; };

        window.submitDeleteConfirm = async function() {
            const targetId = document.getElementById('confirm-target-id').value;
            try {
                const res = await fetch(`${BASE_URL}/user/api/${API.VERSION}/delete/id/${targetId}`, { method: 'DELETE', headers: headers });
                if(res.ok) {
                    showToast('유저 정보가 파기되었습니다.');
                    closeConfirmModal(); closeModal();
                    const curr = parseInt(document.getElementById('pagination-current').value, 10) - 1;
                    loadUserList(curr);
                } else { showToast('삭제 처리에 실패했습니다.', true); }
            } catch(e) { showToast('통신 장애', true); }
        };

        loadUserList(0);
    })();
</script>
