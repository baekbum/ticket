services:
  # 1. Redis
  queue-redis:
    image: redis:latest
    container_name: queue-redis
    ports:
      - "6381:6379"
    networks:
      - ticket-network # 이 서비스가 사용할 네트워크 지정
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    #restart: always # 컴퓨터 재부팅 시 자동 실행 (추천)

# 네트워크 정의 부분
networks:
  ticket-network:
    external: true # 수동으로 만든(docker network create) 네트워크를 사용함

volumes:
  redis_data:
