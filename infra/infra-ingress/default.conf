server {
    listen 80;
    server_name localhost;

    # 1. 도커 내부 DNS 서버 (반드시 필요)
    # 변수를 사용해 proxy_pass를 할 때 호스트를 찾기 위한 도커 전용 DNS 주소입니다.
    resolver 127.0.0.11 valid=30s;

    # [공통 설정]
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # 2. 권한 서비스 (Auth Service)
    location /auth/ {
        # [핵심] 변수에 주소를 담으면 시작 시점에 서비스가 죽어있어도 Nginx가 켜집니다.
        # auth-service라는 이름만으로도 도커가 여러 레플리카에 로드 밸런싱을 해줍니다.
        set $auth_backend http://auth-service:8080;

        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass $auth_backend;
    }

    # 3. 유저 서비스 (User Service)
    location /user/ {
        # user-service가 꺼져있어도 Nginx는 에러 없이 실행됩니다.
        set $user_backend http://user-service:8080;

        rewrite ^/user/(.*)$ /$1 break;
        proxy_pass $user_backend;
    }

    # 에러 페이지 설정 (선택 사항)
    #error_page 502 /502.html;
    #location = /502.html {
    #    return 502 '{"error": "Service is currently unavailable"}';
    #    add_header Content-Type application/json;
    #}
}