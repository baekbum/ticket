server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # [공통 설정]
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # =================================================================
    # 내부 인증 검증용 내부 루틴 (클라이언트에서 직접 호출 불가)
    # =================================================================
    location = /internal-auth-validate {
        internal; # 외부 호출 차단 (보안)
        set $auth_backend http://auth-service:8080;

        # auth-service의 실제 인증 검증 API 엔드포인트로 포워딩
        # (기존 인증 헤더인 Authorization이 그대로 auth-service로 전달됩니다)
        proxy_pass $auth_backend/auth/api/v1/validate;

        # 백엔드 서버로 실제 바디를 보낼 필요가 없으므로 성능을 위해 비웁니다.
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # 2. 권한 서비스 (Auth Service) - 로그인/토큰재발급 등은 무조건 permitAll이므로 auth_request 금지!
    location /auth/ {
        set $auth_backend http://auth-service:8080;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass $auth_backend;
    }

    # 3. 유저 서비스 (User Service) - 인증 필요
    location /user/ {
        auth_request /internal-auth-validate;

        # auth-service가 준 헤더를 Nginx 변수에 저장
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        # 뒷단 user-service로 토스할 헤더에 심기
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-User-Role $user_role;

        set $user_backend http://user-service:8080;
        rewrite ^/user/(.*)$ /$1 break;
        proxy_pass $user_backend;
    }

    # 4. 티켓 서비스 (Ticket Service) - 인증 필요
    location /ticket/ {
        auth_request /internal-auth-validate;

        # auth-service가 준 헤더를 Nginx 변수에 저장
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        # 뒷단 ticket-service로 토스할 헤더에 심기
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-User-Role $user_role;

        set $ticket_backend http://ticket-service:8080;
        rewrite ^/ticket/(.*)$ /$1 break;
        proxy_pass $ticket_backend;
    }

    # 정적 뷰 서비스 - 인증 불필요
    location /view/ {
        set $view_backend http://view-service:3000;
        rewrite ^/view/(.*)$ /$1 break;
        proxy_pass $view_backend;
    }
}