upstream auth-service-group {
    # 도커 내부 DNS를 통해 레플리카들로 로드밸런싱됩니다.
    server auth-service:8080;
}

server {
    listen 80;
    server_name localhost;

    # 1. 유저 요청: http://localhost/auth/api/v1/login
    location /auth/ {
        # [핵심 수정] 정규식을 사용해 /auth/ 뒤의 모든 경로를 캡처합니다.
        # 예: /auth/api/v1/login -> /api/v1/login
        rewrite ^/auth/(.*)$ /$1 break;

        # 수정된 경로를 upstream 그룹으로 전달합니다.
        proxy_pass http://auth-service-group;

        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # [추가] POST 요청 시 403 방지를 위한 설정
        # 때로는 Nginx가 리다이렉트 과정에서 포트를 잃어버리는 경우를 방지합니다.
        proxy_redirect off;
    }
}