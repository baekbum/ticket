# 1. 서비스별 Upstream 정의
# 서비스가 추가될 때마다 이곳에 그룹을 추가하면 로드 밸런싱 확장이 쉬워집니다.
upstream auth-service-group {
    server auth-service:8080;
}

upstream user-service-group {
    server user-service:8080;
}

server {
    listen 80;
    server_name localhost;

    # [공통 설정] 모든 location 블록에 적용될 프록시 헤더를 상단으로 뺍니다.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # 2. 권한 서비스 (Auth Service)
    # http://localhost/auth/api/v1/login -> http://auth-service:8080/api/v1/login
    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://auth-service-group;
    }

    # 3. 유저 서비스 (User Service)
    # http://localhost/user/api/v1/admin/users -> http://user-service:8080/api/v1/admin/users
    location /user/ {
        rewrite ^/user/(.*)$ /$1 break;
        proxy_pass http://user-service-group;
    }

    # 필요 시 에러 페이지 설정 등 추가 가능
}