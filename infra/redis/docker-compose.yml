version: '3.8'

services:
  refresh-redis:
    image: redis:latest
    container_name: refresh-redis
    ports:
      - "6379:6379"
    networks:
      - ticket-network # 이 서비스가 사용할 네트워크 지정
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always # 컴퓨터 재부팅 시 자동 실행 (추천)

# 네트워크 정의 부분
networks:
  ticket-network:
    external: true # 수동으로 만든(docker network create) 네트워크를 사용함

volumes:
  redis_data: