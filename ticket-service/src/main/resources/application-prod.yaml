server:
  port: 8080

spring:
  application:
    name: ticket-service
  datasource:
    driver-class-name: org.postgresql.Driver
    # 환경변수가 있으면 쓰고, 없으면 비워둠 (가독성 유지)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
      jdbc:
        batch_size: 500  # 500개씩 모아서 처리
        order_inserts: true
        order_updates: true
token:
  secret: ${TOKEN_SECRET:ticket-project-secret-value-is-made-by-random}
  accessTokenValidityInMilliseconds: 3600000
  refreshTokenValidityInMilliseconds: 1209600000