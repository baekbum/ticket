server:
  port: 8080

spring:
  application:
    name: auth-service
  datasource:
    driver-class-name: org.postgresql.Driver
    # 환경변수가 있으면 쓰고, 없으면 비워둠 (가독성 유지)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  data: # 최신 버전은 spring.data.redis 입니다.
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

token:
  secret: ${TOKEN_SECRET:ticket-project-secret-value-is-made-by-random}
  accessTokenValidityInMilliseconds: 3600000
  refreshTokenValidityInMilliseconds: 1209600000