services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      # 1. 데이터베이스 연결 (인프라의 auth-db 컨테이너 이름 사용)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=auth_user
      - SPRING_DATASOURCE_PASSWORD=auth_pass

      # 2. Redis 연결 (인프라의 refresh-redis 컨테이너 이름 사용)
      - SPRING_DATA_REDIS_HOST=refresh-redis
      - SPRING_DATA_REDIS_PORT=6379

      # 3. 필요시 활성 프로파일 지정 (선택 사항)
      - SPRING_PROFILES_ACTIVE=prod

    # 인프라 컨테이너들이 먼저 떠 있어야 하므로 명시 (참고용)
    # 다만 external 네트워크 환경에서는 컨테이너가 없으면 에러가 날 수 있으니
    # 인프라를 먼저 docker compose up 해두는 것이 중요합니다.
    networks:
      - ticket-network

networks:
  ticket-network:
    external: true