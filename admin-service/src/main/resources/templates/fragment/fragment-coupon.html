<head>
  <meta charset="UTF-8">
</head>
<link rel="stylesheet" th:href="@{/css/coupon/fragment-coupon.css}">

<div class="frag-header">
  <h2>쿠폰 관리</h2>
  <p class="sub-txt">쿠폰 정책을 등록하고 할인 조건, 유효 기간, 상태를 관리합니다.</p>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <input type="text" class="search-input" id="coupon-search-name" placeholder="쿠폰명 검색">
    <button class="btn" onclick="triggerCouponSearch()"><i class="ti ti-search"></i>검색</button>
    <button class="btn btn-outline" onclick="openCouponSearchModal()">
      <i class="ti ti-adjustments-horizontal"></i>상세 검색
    </button>
    <button class="btn btn-outline" onclick="resetCouponSearch()">
      <i class="ti ti-refresh"></i>검색 조건 초기화
    </button>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-success" onclick="openCouponModalForCreate()">
      <i class="ti ti-discount-plus"></i>신규 쿠폰 등록
    </button>
  </div>
</div>

<div class="table-wrap">
  <table class="coupon-table">
    <colgroup>
      <col style="width:64px;">
      <col style="width:90px;">
      <col style="width:210px;">
      <col style="width:140px;">
      <col style="width:120px;">
      <col style="width:120px;">
      <col style="width:140px;">
      <col style="width:140px;">
      <col style="width:170px;">
      <col style="width:170px;">
      <col style="width:120px;">
      <col style="width:110px;">
      <col style="width:140px;">
    </colgroup>
    <thead>
    <tr>
      <th>순서</th>
      <th class="sortable" data-sort-field="couponId" onclick="handleCouponSortClick(this, event)">쿠폰 ID <i class="sort-icon">↕</i></th>
      <th class="sortable" data-sort-field="name" onclick="handleCouponSortClick(this, event)">쿠폰명 <i class="sort-icon">↕</i></th>
      <th>코드</th>
      <th>할인 타입</th>
      <th>할인 값</th>
      <th>최대 할인</th>
      <th>최소 주문</th>
      <th>유효 시작</th>
      <th>유효 종료</th>
      <th>발급 후 만료</th>
      <th>상태</th>
      <th class="actions">관리</th>
    </tr>
    </thead>
    <tbody id="coupon-table-body"></tbody>
  </table>
</div>

<div th:replace="~{common/pagination :: pagination}"></div>

<div class="f-modal" id="coupon-search-modal">
  <div class="f-modal-content">
    <p class="modal-title">쿠폰 상세 검색</p>
    <p class="modal-subtitle">쿠폰명, 코드, 상태 조건으로 쿠폰 정책을 조회합니다.</p>
    <div class="modal-divider"></div>

    <div class="form-row">
      <div class="form-group">
        <label>쿠폰명</label>
        <input type="text" id="cond-coupon-name" placeholder="쿠폰명">
      </div>
      <div class="form-group">
        <label>쿠폰 코드</label>
        <input type="text" id="cond-coupon-code" placeholder="WELCOME2026">
      </div>
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="cond-coupon-status">
        <option value="">전체 상태</option>
        <option value="ACTIVE">ACTIVE (활성)</option>
        <option value="INACTIVE">INACTIVE (비활성)</option>
        <option value="EXPIRED">EXPIRED (만료)</option>
      </select>
    </div>

    <div class="form-row modal-actions">
      <button class="btn btn-secondary" onclick="closeCouponSearchModal()">취소</button>
      <button class="btn" onclick="submitCouponDetailedSearch()">
        <i class="ti ti-search"></i>이 조건으로 검색
      </button>
    </div>
  </div>
</div>

<div class="f-modal" id="coupon-modal">
  <div class="f-modal-content coupon-modal-content">
    <p class="modal-title" id="coupon-modal-title">쿠폰 등록</p>
    <p class="modal-subtitle" id="coupon-modal-subtitle">쿠폰 정책 정보를 입력합니다.</p>
    <div class="modal-divider"></div>

    <input type="hidden" id="coupon-modal-mode" value="CREATE">
    <input type="hidden" id="coupon-target-id">

    <div class="form-row">
      <div class="form-group">
        <label>쿠폰명</label>
        <input type="text" id="m-coupon-name" placeholder="첫 구매 할인 쿠폰">
      </div>
      <div class="form-group">
        <label>쿠폰 코드</label>
        <input type="text" id="m-coupon-code" placeholder="WELCOME2026">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>할인 타입</label>
        <select id="m-coupon-discount-type" onchange="syncCouponDiscountHelp()">
          <option value="FIXED_AMOUNT">정액 할인</option>
          <option value="PERCENT">정률 할인</option>
        </select>
      </div>
      <div class="form-group">
        <label id="m-coupon-discount-value-label">할인 금액</label>
        <input type="number" id="m-coupon-discount-value" min="1" placeholder="10000">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>최대 할인 금액</label>
        <input type="number" id="m-coupon-max-discount" min="0" placeholder="정률 할인일 때 사용">
      </div>
      <div class="form-group">
        <label>최소 주문 금액</label>
        <input type="number" id="m-coupon-min-order" min="0" placeholder="50000">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>유효 시작</label>
        <input type="datetime-local" id="m-coupon-valid-from">
      </div>
      <div class="form-group">
        <label>유효 종료</label>
        <input type="datetime-local" id="m-coupon-valid-until">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>만료 방식</label>
        <select id="m-coupon-validity-mode" onchange="syncCouponValidityMode()">
          <option value="FIXED">고정 기간</option>
          <option value="AFTER_ISSUE">발급일 기준</option>
        </select>
      </div>
      <div class="form-group">
        <label>발급 후 유효 일수</label>
        <input type="number" id="m-coupon-valid-days-after-issue" min="1" placeholder="30">
      </div>
    </div>

    <div class="form-group">
      <label>상태</label>
      <select id="m-coupon-status">
        <option value="ACTIVE">ACTIVE (활성)</option>
        <option value="INACTIVE">INACTIVE (비활성)</option>
        <option value="EXPIRED">EXPIRED (만료)</option>
      </select>
    </div>

    <div class="form-row modal-actions" id="coupon-modal-actions">
      <button class="btn btn-secondary" onclick="closeCouponModal()">취소</button>
      <button class="btn" id="coupon-submit-btn" onclick="submitCouponForm()">
        <i class="ti ti-device-floppy"></i>저장
      </button>
    </div>
  </div>
</div>

<script th:src="@{/js/common/pagination.js}"></script>
<script th:src="@{/js/coupon/fragment-coupon.js}"></script>
