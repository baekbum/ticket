<head>
  <meta charset="UTF-8">
</head>
<link rel="stylesheet" th:href="@{/css/user/fragment-user.css}">

<!-- ── Page header ── -->
<div class="frag-header">
  <h2>유저(회원) 관리</h2>
  <p class="sub-txt">유저 등록, 조회, 수정, 삭제가 가능합니다.</p>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <div class="toolbar-left">
    <input type="text" class="search-input" id="search-id" placeholder="아이디 검색…">
    <button class="btn" onclick="triggerNormalSearch()"><i class="ti ti-search"></i>검색</button>
    <button class="btn btn-outline" onclick="openSearchModal()"><i class="ti ti-adjustments-horizontal"></i>상세 검색</button>
    <div class="bulk-action-bar" id="bulk-action-bar">
      <i class="ti ti-checkbox"></i>
      <span><span class="bulk-count" id="bulk-count">0</span>명 선택됨</span>
      <button class="btn btn-danger-solid btn-sm" onclick="openBulkDeleteConfirmModal()">
        <i class="ti ti-trash"></i>선택 삭제
      </button>
      <button class="btn btn-outline btn-sm" onclick="clearAllSelections()">선택 해제</button>
    </div>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-success" onclick="openModalForCreate()">
      <i class="ti ti-user-plus"></i>신규 유저 등록
    </button>
  </div>
</div>

<!-- ── Table ── -->
<div class="table-wrap">
  <table class="user-table">
    <thead>
      <tr>
        <th style="text-align:center;">
          <input type="checkbox" id="select-all-checkbox" onclick="toggleSelectAll(this)" title="전체 선택">
        </th>
        <th>순서</th>
        <th class="sortable" data-sort-field="userId" onclick="handleSortClick(this, event)">유저 ID <i class="sort-icon">↕</i></th>
        <th class="sortable" data-sort-field="name"   onclick="handleSortClick(this, event)">이름 <i class="sort-icon">↕</i></th>
        <th class="sortable" data-sort-field="email"  onclick="handleSortClick(this, event)">이메일 <i class="sort-icon">↕</i></th>
        <th>권한</th>
        <th>상태</th>
        <th class="actions">관리</th>
      </tr>
    </thead>
    <tbody id="user-table-body"></tbody>
  </table>
</div>

<div th:replace="~{common/pagination :: pagination}"></div>

<!-- ── 상세 검색 모달 ── -->
<div class="f-modal" id="search-modal">
  <div class="f-modal-content">
    <p class="modal-title">상세 검색 조건</p>
    <p class="modal-subtitle">원하는 조건을 조합해 유저를 검색합니다.</p>
    <div class="modal-divider"></div>
    <div class="form-row">
      <div class="form-group"><label>아이디</label><input type="text" id="cond-id" placeholder="유저 ID"></div>
      <div class="form-group"><label>이름</label><input type="text" id="cond-name" placeholder="이름"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>휴대폰 번호</label><input type="text" id="cond-phone" placeholder="010-XXXX-XXXX"></div>
      <div class="form-group"><label>이메일</label><input type="email" id="cond-email" placeholder="example@test.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>생년월일</label><input type="date" id="cond-birth"></div>
      <div class="form-group"><label>주소</label><input type="text" id="cond-addr" placeholder="시/도/군/구"></div>
    </div>
    <div class="form-group">
      <label>블랙리스트 여부</label>
      <select id="cond-blacklist">
        <option value="">전체 유저</option>
        <option value="false">정상 이용 유저</option>
        <option value="true">블랙리스트 유저</option>
      </select>
    </div>
    <div class="form-row" style="margin-top:1.25rem;">
      <button class="btn btn-secondary" onclick="closeSearchModal()">취소</button>
      <button class="btn" onclick="submitDetailedSearch()"><i class="ti ti-search"></i>이 조건으로 검색</button>
    </div>
  </div>
</div>

<!-- ── 유저 등록/수정/조회 모달 ── -->
<div class="f-modal" id="user-modal">
  <div class="f-modal-content">
    <p class="modal-title" id="modal-title">회원 정보 수정</p>
    <p class="modal-subtitle" id="modal-subtitle">정보를 수정한 뒤 저장 버튼을 눌러주세요.</p>
    <div class="modal-divider"></div>

    <input type="hidden" id="m-modal-mode" value="UPDATE">
    <input type="hidden" id="m-target-id">

    <div class="form-row">
      <div class="form-group">
        <label id="m-user-id-label">유저 고유 ID</label>
        <input type="text" id="m-user-id" placeholder="아이디 입력">
      </div>
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="m-name" placeholder="홍길동">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="m-email" placeholder="example@test.com">
      </div>
      <div class="form-group">
        <label>휴대폰 번호</label>
        <input type="tel" id="m-phone" placeholder="010-1234-5678">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>생년월일</label>
        <input type="date" id="m-birth">
      </div>
      <div class="form-group">
        <label>주소</label>
        <input type="text" id="m-addr" placeholder="">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>블랙리스트 설정</label>
        <select id="m-blacklist">
          <option value="false">정상 이용 유저</option>
          <option value="true">블랙리스트 차단</option>
        </select>
      </div>
      <div class="form-group">
        <label>계정 권한</label>
        <select id="m-role">
          <option value="ROLE_USER">일반 사용자 (USER)</option>
          <option value="ROLE_ADMIN">관리자 (ADMIN)</option>
        </select>
      </div>
    </div>

    <div class="form-group" id="wrapper-password-init" style="margin-top:0.25rem; display:none;">
      <label>비밀번호 계정 관리</label>
      <button class="btn btn-warning" style="width:100%; font-size:13px;" onclick="openPasswordInitConfirmModal()">
        <i class="ti ti-key-off"></i>이 유저의 비밀번호 강제 초기화
      </button>
    </div>

    <div class="form-row" id="modal-action-row" style="margin-top:1.25rem;">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn" id="btn-modal-submit" onclick="submitUserForm()">변경사항 저장</button>
    </div>
    <button class="btn btn-danger-solid" id="btn-modal-delete"
            style="width:100%; margin-top:8px;" onclick="openConfirmModalFromModal()">
      <i class="ti ti-trash"></i>이 유저 영구 삭제
    </button>
  </div>
</div>

<!-- ── 단건 삭제 확인 모달 ── -->
<div class="f-modal" id="confirm-modal">
  <div class="f-modal-content confirm-modal-content">
    <i class="ti ti-alert-triangle confirm-icon" style="color:var(--red);"></i>
    <p class="modal-title" style="text-align:center;">정말 삭제하시겠습니까?</p>
    <p style="font-size:13px; color:var(--text-secondary); margin:8px 0 1.5rem;">삭제된 유저 정보는 복구할 수 없습니다.</p>
    <input type="hidden" id="confirm-target-id">
    <div class="form-row">
      <button class="btn btn-secondary" onclick="closeConfirmModal()">취소</button>
      <button class="btn btn-danger-solid" onclick="submitDeleteConfirm()"><i class="ti ti-trash"></i>삭제</button>
    </div>
  </div>
</div>

<!-- ── 다중 삭제 확인 모달 ── -->
<div class="f-modal" id="bulk-delete-modal">
  <div class="f-modal-content confirm-modal-content">
    <i class="ti ti-alert-triangle confirm-icon" style="color:var(--red);"></i>
    <p class="modal-title" style="text-align:center;">
      선택한 <span id="bulk-delete-count" style="color:var(--red);">0</span>명을 삭제하시겠습니까?
    </p>
    <p style="font-size:13px; color:var(--text-secondary); margin:8px 0 1.5rem;">삭제된 유저 정보는 복구할 수 없습니다.</p>
    <div class="form-row">
      <button class="btn btn-secondary" onclick="closeBulkDeleteConfirmModal()">취소</button>
      <button class="btn btn-danger-solid" onclick="submitBulkDelete()"><i class="ti ti-trash"></i>전체 삭제</button>
    </div>
  </div>
</div>

<!-- ── 비밀번호 초기화 확인 모달 ── -->
<div class="f-modal" id="pw-init-confirm-modal" style="z-index:1100;">
  <div class="f-modal-content confirm-modal-content">
    <i class="ti ti-lock-open confirm-icon" style="color:var(--amber);"></i>
    <p class="modal-title" style="text-align:center;">비밀번호를 초기화하시겠습니까?</p>
    <p style="font-size:13px; color:var(--text-secondary); margin:8px 0 1.5rem;">
      확인 시 해당 계정의 비밀번호가<br>
      <strong style="color:#cc7700;">"123456789!"</strong> 로 즉시 강제 리셋됩니다.
    </p>
    <div class="form-row">
      <button class="btn btn-secondary" onclick="closePasswordInitConfirmModal()">취소</button>
      <button class="btn btn-warning" onclick="submitPasswordInit()"><i class="ti ti-key"></i>초기화 진행</button>
    </div>
  </div>
</div>

<script th:src="@{/js/common/pagination.js}"></script>
<script th:src="@{/js/user/fragment-user.js}"></script>
