<head>
  <meta charset="UTF-8">
</head>
<link rel="stylesheet" th:href="@{/css/coupon/fragment-user-coupon.css}">

<div class="frag-header">
  <h2>유저 쿠폰 관리</h2>
  <p class="sub-txt">유저가 발급받은 쿠폰과 사용 상태, 발급일, 만료일을 조회합니다.</p>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <input type="text" class="search-input" id="user-coupon-search-user-id" placeholder="유저 ID 검색" onkeydown="handleUserCouponSearchKeydown(event)">
    <button class="btn" onclick="triggerUserCouponSearch()"><i class="ti ti-search"></i>검색</button>
    <button class="btn btn-outline" onclick="openUserCouponSearchModal()">
      <i class="ti ti-adjustments-horizontal"></i>상세 검색
    </button>
    <button class="btn btn-outline" onclick="resetUserCouponSearch()">
      <i class="ti ti-refresh"></i>초기화
    </button>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-success" onclick="openUserCouponIssueModal()">
      <i class="ti ti-ticket"></i>쿠폰 발급
    </button>
  </div>
</div>

<div class="table-wrap">
  <table class="user-coupon-table">
    <colgroup>
      <col style="width:64px;">
      <col style="width:120px;">
      <col style="width:150px;">
      <col style="width:220px;">
      <col style="width:140px;">
      <col style="width:120px;">
      <col style="width:120px;">
      <col style="width:160px;">
      <col style="width:170px;">
      <col style="width:170px;">
      <col style="width:170px;">
      <col style="width:170px;">
    </colgroup>
    <thead>
    <tr>
      <th>순서</th>
      <th>유저 쿠폰 ID</th>
      <th>유저 ID</th>
      <th>쿠폰명</th>
      <th>쿠폰 코드</th>
      <th>할인 타입</th>
      <th>할인 값</th>
      <th>상태</th>
      <th>발급일</th>
      <th>사용일</th>
      <th>만료일</th>
      <th class="actions">관리</th>
    </tr>
    </thead>
    <tbody id="user-coupon-table-body">
    <tr>
      <td colspan="12" class="empty-cell">유저 쿠폰 목록을 불러오는 중입니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<div th:replace="~{common/pagination :: pagination}"></div>

<div class="f-modal" id="user-coupon-search-modal">
  <div class="f-modal-content">
    <p class="modal-title">유저 쿠폰 상세 검색</p>
    <p class="modal-subtitle">유저, 쿠폰 정보, 상태, 날짜 조건으로 발급 쿠폰을 조회합니다.</p>
    <div class="modal-divider"></div>

    <div class="form-row">
      <div class="form-group">
        <label>유저 ID</label>
        <input type="text" id="cond-user-coupon-user-id" placeholder="user01">
      </div>
      <div class="form-group">
        <label>쿠폰명</label>
        <input type="text" id="cond-user-coupon-name" placeholder="웰컴 쿠폰">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>쿠폰 코드</label>
        <input type="text" id="cond-user-coupon-code" placeholder="WELCOME2026">
      </div>
      <div class="form-group">
        <label>할인 타입</label>
        <select id="cond-user-coupon-discount-type">
          <option value="">전체 할인 타입</option>
          <option value="FIXED_AMOUNT">정액</option>
          <option value="PERCENT">정률</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>상태</label>
        <select id="cond-user-coupon-status">
          <option value="">전체 상태</option>
          <option value="ISSUED">ISSUED (발급)</option>
          <option value="USED">USED (사용)</option>
          <option value="EXPIRED">EXPIRED (만료)</option>
          <option value="CANCELLED">CANCELLED (취소)</option>
        </select>
      </div>
      <div class="form-group">
        <label>발급일</label>
        <input type="date" id="cond-user-coupon-issued-at">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>만료일</label>
        <input type="date" id="cond-user-coupon-expires-at">
      </div>
      <div class="form-group">
        <label>사용일</label>
        <input type="date" id="cond-user-coupon-used-at">
      </div>
    </div>

    <div class="form-row modal-actions">
      <button class="btn btn-secondary" onclick="closeUserCouponSearchModal()">취소</button>
      <button class="btn" onclick="submitUserCouponDetailedSearch()">
        <i class="ti ti-search"></i>조건 검색
      </button>
    </div>
  </div>
</div>

<div class="f-modal" id="user-coupon-issue-modal">
  <div class="f-modal-content">
    <p class="modal-title">쿠폰 발급</p>
    <p class="modal-subtitle">특정 유저에게 쿠폰을 수동 발급합니다.</p>
    <div class="modal-divider"></div>

    <div class="form-row">
      <div class="form-group">
        <label>유저 ID</label>
        <input type="text" id="m-user-coupon-user-id" placeholder="user01">
      </div>
      <div class="form-group">
        <label>쿠폰 ID</label>
        <input type="number" id="m-user-coupon-coupon-id" min="1" placeholder="1">
      </div>
    </div>

    <div class="form-group">
      <label>만료일</label>
      <input type="datetime-local" id="m-user-coupon-expires-at">
    </div>

    <div class="form-row modal-actions">
      <button class="btn btn-secondary" onclick="closeUserCouponIssueModal()">취소</button>
      <button class="btn" onclick="submitUserCouponIssue()">
        <i class="ti ti-device-floppy"></i>발급
      </button>
    </div>
  </div>
</div>

<div class="f-modal" id="user-coupon-edit-modal">
  <div class="f-modal-content">
    <p class="modal-title">유저 쿠폰 수정</p>
    <p class="modal-subtitle">상태와 만료일을 수정합니다.</p>
    <div class="modal-divider"></div>

    <input type="hidden" id="m-edit-user-coupon-id">

    <div class="form-row">
      <div class="form-group">
        <label>유저 ID</label>
        <input type="text" id="m-edit-user-id" disabled>
      </div>
      <div class="form-group">
        <label>쿠폰명</label>
        <input type="text" id="m-edit-coupon-name" disabled>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>상태</label>
        <select id="m-edit-user-coupon-status">
          <option value="ISSUED">ISSUED (발급)</option>
          <option value="USED">USED (사용)</option>
          <option value="EXPIRED">EXPIRED (만료)</option>
          <option value="CANCELLED">CANCELLED (취소)</option>
        </select>
      </div>
      <div class="form-group">
        <label>만료일</label>
        <input type="datetime-local" id="m-edit-user-coupon-expires-at">
      </div>
    </div>

    <div class="form-row modal-actions">
      <button class="btn btn-secondary" onclick="closeUserCouponEditModal()">취소</button>
      <button class="btn" onclick="submitUserCouponUpdate()">
        <i class="ti ti-device-floppy"></i>저장
      </button>
    </div>
  </div>
</div>

<div class="f-modal" id="user-coupon-detail-modal">
  <div class="f-modal-content">
    <p class="modal-title">유저 쿠폰 상세</p>
    <p class="modal-subtitle">발급된 쿠폰 정보를 확인합니다.</p>
    <div class="modal-divider"></div>

    <div class="detail-grid" id="user-coupon-detail-grid"></div>

    <div class="modal-actions single-action">
      <button class="btn btn-secondary" onclick="closeUserCouponDetailModal()">닫기</button>
    </div>
  </div>
</div>

<script th:src="@{/js/common/pagination.js}"></script>
<script th:src="@{/js/coupon/fragment-user-coupon.js}"></script>
